<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Vocab Pro (Multi-Ex Mode)</title>
    <style>
        :root { --primary: #5c67f2; --accent: #ff4757; --success: #2ed573; --bg: #f8f9fa; --soft-purple: #eef1ff; --warning: #ffa502; --neutral: #a0a0a0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 60px; }
        
        /* タブ・共通UI */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 5px 0; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 12px; cursor: pointer; background: #e0e0e0; font-weight: bold; font-size: 11px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 450px; }
        .panel.active { display: block; }

        /* 統計・フォーム */
        .stats-bar { display: flex; gap: 5px; margin-bottom: 15px; }
        .stat-item { flex: 1; background: var(--soft-purple); padding: 8px 2px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 9px; color: #777; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 14px; font-weight: bold; color: var(--primary); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #777; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        textarea { height: 80px; resize: none; }
        
        /* ボタン */
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-sub { width: 100%; padding: 12px; background: #eee; color: #333; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 5px; }
        .btn-audio-mini { background: #f0f2ff; border: 1.5px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; margin: 2px; }

        /* テスト回答アクション */
        .btn-flex { display: flex; gap: 10px; margin-top: 10px; }
        .btn-flex .btn-main { flex: 1; margin-bottom: 0; }
        .btn-know { background: var(--success) !important; }
        .btn-check { background: var(--warning) !important; }

        /* 単語カード */
        .word-card { border-bottom: 1px solid #f4f4f4; padding: 15px 0; display: flex; align-items: flex-start; gap: 10px; }
        .status-badge { font-size: 22px; cursor: pointer; min-width: 35px; text-align: center; padding-top: 3px; }
        .word-content { flex: 1; }
        .badge-label { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; margin-left: 6px; vertical-align: middle; }
        .bg-new { background: var(--neutral); }
        .bg-know { background: var(--success); }
        .bg-review { background: var(--warning); }
        .ex-box { background: #f0f2ff; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; color: #444; border-left: 3px solid var(--primary); }
        .ex-item { margin-bottom: 8px; }
        .ex-item:last-child { margin-bottom: 0; }
        .cute-speak-btn { background: var(--soft-purple); border: none; width: 34px; height: 34px; border-radius: 50%; color: var(--primary); cursor: pointer; font-weight: bold; }

        #listen-display { text-align: center; padding: 20px 10px; }
        .listen-card { background: var(--soft-purple); padding: 30px; border-radius: 25px; margin-bottom: 15px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .playing-ko { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 15px; word-break: break-all; }
        .playing-ja { font-size: 18px; color: #666; word-break: break-all; }
        .ls-check-btn { margin-bottom: 25px; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; background: white; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .ls-check-btn.active { border-color: var(--warning); color: var(--warning); background: #fffcf0; }

        #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 3000; opacity: 0; visibility: hidden; transition: 0.3s; }
        #toast.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showPanel('add', event)">登録</button>
        <button class="tab-btn" onclick="showPanel('list', event)">単語帳</button>
        <button class="tab-btn" onclick="showPanel('test', event)">テスト</button>
        <button class="tab-btn" onclick="showPanel('listen', event)">リスニング</button>
        <button class="tab-btn" onclick="showPanel('settings', event)">設定</button>
    </div>

    <div id="panel-add" class="panel active">
        <div class="form-group"><label>韓国語</label><input type="text" id="in-ko"></div>
        <div class="form-group"><label>ヘヨ体</label><input type="text" id="in-heyotai"></div>
        <div class="form-group"><label>意味</label><input type="text" id="in-ja"></div>
        <div class="form-group"><label>発音</label><input type="text" id="in-pron"></div>
        <div class="form-group"><label>カテゴリ</label><input type="text" id="in-cat" placeholder="名詞, 旅行"></div>
        <div class="form-group"><label>例文 (韓国語) ※複数可：改行で区切る</label><textarea id="in-ex-ko"></textarea></div>
        <div class="form-group"><label>例文 (日本語) ※対応させて改行</label><textarea id="in-ex-ja"></textarea></div>
        <button class="btn-main" onclick="saveNewWord()">シートへ送信</button>
    </div>

    <div id="panel-list" class="panel">
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-label">未設定🆕</span><span id="stat-new" class="stat-value" style="color:var(--neutral)">0</span></div>
            <div class="stat-item"><span class="stat-label">できた🌸</span><span id="stat-learned" class="stat-value" style="color:var(--success)">0</span></div>
            <div class="stat-item"><span class="stat-label">要復習✍️</span><span id="stat-checked" class="stat-value" style="color:var(--warning)">0</span></div>
        </div>
        <div style="position: relative; margin-bottom: 15px;">
            <input type="text" id="search-input" oninput="renderList()" placeholder="🔍 単語・意味・例文で検索..." 
           style="width:100%; padding:12px 40px 12px 15px; border:1.5px solid #eee; border-radius:12px; box-sizing:border-box; font-size:16px;">
             <span id="search-clear" onclick="document.getElementById('search-input').value='';renderList();" 
          style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#ccc; font-size:22px; display:none;">×</span>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <select id="filter-cat" onchange="renderList()" style="flex:1;"></select>
            <select id="sort-order" onchange="renderList()" style="flex:1;"><option value="newest">新着順</option><option value="status">要復習</option></select>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="panel-test" class="panel">
        <div id="test-setup">
            <div class="form-group"><label>出題モード</label><select id="test-mode"><option value="ko-ja">韓国語 ⇨ 日本語</option><option value="ja-ko">日本語 ⇨ 韓国語</option></select></div>
            <div class="form-group"><label>カテゴリ</label><select id="test-cat"></select></div>
            <div class="form-group"><label>出題範囲</label><select id="test-scope"><option value="all">すべて</option><option value="only_new">🆕 未設定のみ</option><option value="only_checked">✍️ 要復習のみ</option></select></div>
            <div class="form-group"><label>問題数</label><select id="test-count"><option value="10">10問</option><option value="20">20問</option><option value="999">すべて</option></select></div>
            <button class="btn-main" onclick="startTest()">テスト開始</button>
        </div>
        <div id="test-display" style="display:none; text-align:center;">
            <div id="test-progress" style="font-size:12px; color:#999;"></div>
            <div id="q-text" style="font-size:30px; font-weight:bold; margin:20px 0; min-height:80px; display:flex; align-items:center; justify-content:center;"></div>
            <div id="test-audio-btns" style="margin-bottom:20px;"></div>
            <div id="a-text" style="display:none; margin-bottom:20px; text-align:left; background:#fff0f1; padding:15px; border-radius:10px; border:1px solid #ffdfe1;"></div>
            <button class="btn-main" id="ans-btn" style="background:#eee; color:#333;" onclick="showAnswer()">答えを見る</button>
            <div id="post-ans-actions" style="display:none;">
                <div class="btn-flex">
                    <button class="btn-main btn-check" onclick="setResultAndNext('review')">わからない✍️</button>
                    <button class="btn-main btn-know" onclick="setResultAndNext('learned')">わかった🌸</button>
                </div>
            </div>
            <button class="btn-sub" onclick="stopTest()" style="margin-top:20px; opacity:0.5;">戻る</button>
        </div>
    </div>

    <div id="panel-listen" class="panel">
        <div id="listen-setup">
            <div class="form-group"><label>再生モード</label><select id="listen-mode"><option value="ko-ja">韓国語 ⇨ 日本語</option><option value="ja-ko">日本語 ⇨ 韓国語</option></select></div>
            <div class="form-group"><label>カテゴリ</label><select id="listen-cat"></select></div>
            <div class="form-group"><label>対象範囲</label><select id="listen-scope"><option value="all">すべて</option><option value="only_checked">✍️ 要復習のみ</option></select></div>
            <div class="form-group"><label>再生数</label><select id="listen-count"><option value="10">10問</option><option value="30">30問</option><option value="999">すべて</option></select></div>
            <button class="btn-main" onclick="startListening()">リスニング開始</button>
        </div>
        <div id="listen-display" style="display:none;">
            <div id="listen-progress" style="font-size:12px; color:#999; margin-bottom:15px;"></div>
            <div class="listen-card">
                <div id="ls-ko" class="playing-ko">-</div>
                <div id="ls-ja" class="playing-ja">-</div>
            </div>
            <button id="ls-quick-check" class="ls-check-btn" onclick="cycleStatus()">ステータス切替</button>
            <button class="btn-main" style="background:var(--accent);" onclick="stopListening()">停止</button>
        </div>
    </div>

    <div id="panel-settings" class="panel">
        <div class="form-group"><label>GAS URL</label><input type="text" id="conf-gas-url"></div>
        <button class="btn-main" onclick="saveConfig()">保存</button>
        <button class="btn-sub" onclick="syncFromSheet()">同期</button>
    </div>
</div>

<div id="toast"></div>

<script>
    let words = JSON.parse(localStorage.getItem('k_vocab_v1')) || [];
    let wordStatus = JSON.parse(localStorage.getItem('k_word_status_v2')) || {};
    let testList = [];
    let currentIdx = 0;
    let isListening = false;
    let testMode = 'ko-ja';

    window.onload = () => {
        document.getElementById('conf-gas-url').value = localStorage.getItem('conf_gas_url') || '';
        renderList(); updateFilterOptions();
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function showPanel(name, event) {
        if(isListening && name !== 'listen') { if(!confirm("リスニングを停止しますか？")) return; stopListening(); }
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
        if(name === 'list') renderList();
        if(name === 'test' || name === 'listen') updateFilterOptions();
    }

    function saveConfig() { localStorage.setItem('conf_gas_url', document.getElementById('conf-gas-url').value.trim()); showToast("保存完了"); }

    async function speak(text, lang = 'ko-KR') {
    if (!window.speechSynthesis || !text) return;
    
    // 音声の重複を防ぐため一度キャンセル
    window.speechSynthesis.cancel();
    
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = lang;
    uttr.rate = 0.9; // iOS 18では少し遅くすると品質が安定します
    uttr.pitch = 1.0;
    uttr.volume = 1.0;

    // 音声エンジンの選択ロジックを強化
    const voices = window.speechSynthesis.getVoices();
    
    // 品質が高いとされているエンジンを優先的に抽出
    const preferredVoice = voices.find(v => 
        (v.lang.startsWith(lang)) && 
        (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Siri'))
    ) || voices.find(v => v.lang.startsWith(lang));

    if (preferredVoice) {
        uttr.voice = preferredVoice;
    }

    return new Promise((resolve) => {
        uttr.onend = () => resolve();
        uttr.onerror = (e) => {
            console.error("Speech Error:", e);
            resolve();
        };
        window.speechSynthesis.speak(uttr);
    });
}

    async function syncFromSheet() {
        const url = localStorage.getItem('conf_gas_url');
        if(!url) return alert("URL未設定");
        showToast("同期中...");
        try {
            const r = await fetch(url);
            const data = await r.json();
            words = data.slice(1).map(row => ({
                no: row[0].toString(), korean: row[1], heyotai: row[2], meaning: row[3],
                pron: row[4], cats: (row[5] || '未分類').toString().split(/[,|]/).map(s => s.trim()),
                ex_ko: row[6] || '', ex_ja: row[7] || ''
            })).filter(w => w.korean);
            localStorage.setItem('k_vocab_v1', JSON.stringify(words));

            wordStatus = {};
            data.slice(1).forEach(row => {
                const id = row[0].toString();
                const val = row[8] || "";
                if (val.includes("できた")) wordStatus[id] = "learned";
                else if (val.includes("要復習")) wordStatus[id] = "review";
            });
            localStorage.setItem('k_word_status_v2', JSON.stringify(wordStatus));
            renderList(); updateFilterOptions(); showToast("同期成功");
        } catch (e) { alert("同期失敗"); }
    }

    function updateFilterOptions() {
        const allCats = [...new Set(words.flatMap(w => w.cats))].filter(Boolean);
        const options = '<option value="">すべてのカテゴリ</option>' + allCats.map(c => `<option value="${c}">${c}</option>`).join('');
        ['filter-cat', 'test-cat', 'listen-cat'].forEach(id => {
            const el = document.getElementById(id); if(el) { const cur = el.value; el.innerHTML = options; el.value = cur; }
        });
    }

function renderList() {
    // 1. 要素の取得（存在確認付き）
    const catEl = document.getElementById('filter-cat');
    const sortEl = document.getElementById('sort-order');
    const searchEl = document.getElementById('search-input');
    const container = document.getElementById('list-container');

    if (!container) return;

    const cat = catEl ? catEl.value : '';
    const sort = sortEl ? sortEl.value : 'newest';
    // 検索ワードを小文字・トリム
    const searchWord = searchEl ? searchEl.value.toLowerCase().trim() : '';
    
    // クリアボタン表示制御
    const clearBtn = document.getElementById('search-clear');
    if (clearBtn) clearBtn.style.display = searchWord ? 'block' : 'none';

    // 2. フィルタリング（String() で囲むことで数値エラーを完全回避）
    let display = words.filter(w => {
        // カテゴリ一致チェック
        const catMatch = !cat || (w.cats && w.cats.includes(cat));
        
        // 検索一致チェック（String() ですべて文字列に変換してから比較）
        const searchMatch = !searchWord || 
            String(w.korean || '').toLowerCase().includes(searchWord) || 
            String(w.meaning || '').toLowerCase().includes(searchWord) || 
            String(w.ex_ko || '').toLowerCase().includes(searchWord) ||
            String(w.pron || '').toLowerCase().includes(searchWord);

        return catMatch && searchMatch;
    });

    // 3. 統計の更新
    let countNew = 0, countLearned = 0, countReview = 0;
    display.forEach(w => {
        const s = wordStatus[w.no];
        if(s === 'learned') countLearned++;
        else if(s === 'review') countReview++;
        else countNew++;
    });
    
    const sn = document.getElementById('stat-new');
    const sl = document.getElementById('stat-learned');
    const sc = document.getElementById('stat-checked');
    if(sn) sn.innerText = countNew;
    if(sl) sl.innerText = countLearned;
    if(sc) sc.innerText = countReview;

    // 4. ソート処理
    if(sort === 'status') {
        const order = { 'review': 0, 'new': 1, 'learned': 2 };
        display.sort((a,b) => (order[wordStatus[a.no]||'new']) - (order[wordStatus[b.no]||'new']));
    } else {
        // IDを数値として比較して降順（新着順）
        display.sort((a,b) => Number(b.no || 0) - Number(a.no || 0));
    }

    // 5. HTML出力
    if (display.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:50px 10px; color:#999;">一致する単語がありません</div>`;
        return;
    }

    container.innerHTML = display.map(w => {
        const status = wordStatus[w.no] || 'new';
        const config = {
            'new': { icon: '🆕', class: 'bg-new', text: '未設定' },
            'learned': { icon: '🌸', class: 'bg-know', text: 'できた' },
            'review': { icon: '✍️', class: 'bg-review', text: '要復習' }
        }[status];

        const exKos = (w.ex_ko || '').split('\n').filter(s => s.trim());
        const exJas = (w.ex_ja || '').split('\n');
        let exHtml = '';
        if(exKos.length > 0) {
            exHtml = '<div class="ex-box">';
            exKos.forEach((ko, i) => {
                exHtml += `
                <div class="ex-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:bold; flex:1;">${ko}</span>
                        <button class="cute-speak-btn" style="width:24px; height:24px; font-size:10px;" onclick="speak(\`${ko.replace(/`/g, "\\`").replace(/\$/g, "\\$")}\`)">♪</button>
                    </div>
                    <div style="font-size:12px; color:#666;">${exJas[i] || ''}</div>
                </div>`;
            });
            exHtml += '</div>';
        }

        return `
        <div class="word-card">
            <div class="status-badge" onclick="cycleStatus('${w.no}')">${config.icon}</div>
            <div class="word-content">
                <div style="font-weight:bold; color:var(--primary); font-size:1.1rem;">
                    ${w.korean}<span class="badge-label ${config.class}">${config.text}</span>
                </div>
                <div style="font-size:13px; color:#666;">${w.meaning} <span style="color:#aaa; font-size:11px;">[${w.pron || ''}]</span></div>
                <div style="font-size:12px; color:var(--accent);">${w.heyotai || ''}</div>
                ${exHtml}
            </div>
            <button class="cute-speak-btn" onclick="speak('${w.korean}')">♪</button>
        </div>`;
    }).join('');
}

    function cycleStatus(no) {
        if(!no && testList[currentIdx]) no = testList[currentIdx].no;
        const current = wordStatus[no] || 'new';
        const next = { 'new': 'review', 'review': 'learned', 'learned': 'new' }[current];
        if(next === 'new') delete wordStatus[no];
        else wordStatus[no] = next;
        localStorage.setItem('k_word_status_v2', JSON.stringify(wordStatus));
        renderList();
        if(isListening || document.getElementById('test-display').style.display === 'block') updateStatusUI(no);
    }

    function updateStatusUI(no) {
        const btn = document.getElementById('ls-quick-check');
        if(!btn) return;
        const s = wordStatus[no] || 'new';
        const label = { 'new': '🆕 未設定', 'learned': '🌸 できた', 'review': '✍️ 要復習' }[s];
        btn.innerText = label + " (タップで切替)";
    }

    function startTest() {
        testMode = document.getElementById('test-mode').value;
        const cat = document.getElementById('test-cat').value;
        const scope = document.getElementById('test-scope').value;
        const count = parseInt(document.getElementById('test-count').value);
        let filtered = words.filter(w => !cat || w.cats.includes(cat));
        if(scope === "only_new") filtered = filtered.filter(w => !wordStatus[w.no]);
        if(scope === "only_checked") filtered = filtered.filter(w => wordStatus[w.no] === 'review');
        testList = filtered.sort(() => Math.random() - 0.5).slice(0, count);
        if(!testList.length) return alert("対象なし");
        currentIdx = 0; 
        document.getElementById('test-setup').style.display = 'none'; 
        document.getElementById('test-display').style.display = 'block'; 
        showQuestion();
    }

    function showQuestion() {
        const q = testList[currentIdx];
        document.getElementById('test-progress').innerText = `${currentIdx + 1} / ${testList.length}`;
        document.getElementById('q-text').innerText = (testMode === 'ko-ja') ? q.korean : q.meaning;
        
        let audioHtml = `<button class="btn-audio-mini" onclick="speak('${q.korean}')">単語 ♪</button>`;
        if(q.ex_ko) {
            const firstEx = q.ex_ko.split('\n')[0];
            audioHtml += `<button class="btn-audio-mini" onclick="speak(\`${firstEx.replace(/`/g, "\\`")}\`)">例文 ♪</button>`;
        }
        document.getElementById('test-audio-btns').innerHTML = audioHtml;
        document.getElementById('a-text').style.display = 'none'; 
        document.getElementById('ans-btn').style.display = 'block'; 
        document.getElementById('post-ans-actions').style.display = 'none';
        if(testMode === 'ko-ja') speak(q.korean);
    }

    function showAnswer() {
        const q = testList[currentIdx];
        const exKos = q.ex_ko ? q.ex_ko.split('\n') : [];
        const exJas = q.ex_ja ? q.ex_ja.split('\n') : [];
        let exHtml = '';
        if(exKos.length > 0) {
            exHtml = '<div style="margin-top:10px; padding-top:10px; border-top:1px dashed #ffdfe1; font-size:13px;">';
            exKos.forEach((ko, i) => {
                if(ko || exJas[i]) exHtml += `<div style="margin-bottom:5px;"><b>${ko || ''}</b><br>${exJas[i] || ''}</div>`;
            });
            exHtml += '</div>';
        }

        document.getElementById('a-text').innerHTML = `
            <div>${testMode==='ko-ja'?'意味':'韓国語'}：<b style="color:var(--accent); font-size:1.2rem;">${testMode==='ko-ja'?q.meaning:q.korean}</b></div>
            <div style="font-size:14px; margin-top:5px;">ヘヨ体：<b>${q.heyotai || '-'}</b> / 発音：<b>${q.pron || '-'}</b></div>
            ${exHtml}
        `;
        if(testMode !== 'ko-ja') speak(q.korean);
        document.getElementById('a-text').style.display = 'block'; 
        document.getElementById('ans-btn').style.display = 'none'; 
        document.getElementById('post-ans-actions').style.display = 'block';
    }

    async function autoBackupToSheet() {
        const url = localStorage.getItem('conf_gas_url');
        if (!url) return;
        const backupData = { type: "backup", data: JSON.stringify(wordStatus) };
        try {
            fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify(backupData) });
            showToast("クラウド同期完了");
        } catch (e) { console.error("Backup Error:", e); }
    }

    function setResultAndNext(status) {
        const q = testList[currentIdx];
        wordStatus[q.no] = status;
        localStorage.setItem('k_word_status_v2', JSON.stringify(wordStatus));
        currentIdx++;
        if (currentIdx < testList.length) showQuestion();
        else { autoBackupToSheet(); alert("テスト終了！スプレッドシートを更新しました。"); stopTest(); }
    }

    function stopTest() { document.getElementById('test-setup').style.display = 'block'; document.getElementById('test-display').style.display = 'none'; renderList(); }

    async function startListening() {
        const mode = document.getElementById('listen-mode').value;
        const cat = document.getElementById('listen-cat').value;
        const scope = document.getElementById('listen-scope').value;
        const count = parseInt(document.getElementById('listen-count').value);
        let filtered = words.filter(w => !cat || w.cats.includes(cat));
        if(scope === "only_checked") filtered = filtered.filter(w => wordStatus[w.no] === 'review');
        testList = filtered.sort(() => Math.random() - 0.5).slice(0, count);
        if(!testList.length) return alert("対象なし");
        currentIdx = 0; isListening = true;
        document.getElementById('listen-setup').style.display = 'none'; 
        document.getElementById('listen-display').style.display = 'block';
        loopListening(mode);
    }

    async function loopListening(mode) {
        const gap = 800;
        while(isListening && currentIdx < testList.length) {
            const q = testList[currentIdx];
            document.getElementById('listen-progress').innerText = `再生中: ${currentIdx + 1} / ${testList.length}`;
            updateStatusUI(q.no);
            
            // 1. 単語
            if(mode === 'ko-ja') {
                document.getElementById('ls-ko').innerText = q.korean;
                document.getElementById('ls-ja').innerText = "-";
                await speak(q.korean, 'ko-KR'); await new Promise(r => setTimeout(r, gap)); 
                if(!isListening) break;
                document.getElementById('ls-ja').innerText = q.meaning;
                await speak(q.meaning, 'ja-JP');
            } else {
                document.getElementById('ls-ko').innerText = q.meaning;
                document.getElementById('ls-ja').innerText = "-";
                await speak(q.meaning, 'ja-JP'); await new Promise(r => setTimeout(r, gap)); 
                if(!isListening) break;
                document.getElementById('ls-ja').innerText = q.korean;
                await speak(q.korean, 'ko-KR');
            }
            await new Promise(r => setTimeout(r, gap));
            if(!isListening) break;

            // 2. 複数例文の連続読み上げ
            if(q.ex_ko) {
                const exKos = q.ex_ko.split('\n');
                const exJas = q.ex_ja.split('\n');
                for(let i = 0; i < exKos.length; i++) {
                    if(!exKos[i]) continue;
                    document.getElementById('ls-ko').innerText = (mode === 'ko-ja') ? exKos[i] : (exJas[i] || '-');
                    document.getElementById('ls-ja').innerText = (mode === 'ko-ja') ? (exJas[i] || '-') : exKos[i];
                    if(mode === 'ko-ja') {
                        await speak(exKos[i], 'ko-KR'); 
                        await new Promise(r => setTimeout(r, 500));
                        if(exJas[i]) await speak(exJas[i], 'ja-JP');
                    } else {
                        if(exJas[i]) await speak(exJas[i], 'ja-JP'); 
                        await new Promise(r => setTimeout(r, 500));
                        await speak(exKos[i], 'ko-KR');
                    }
                    await new Promise(r => setTimeout(r, 1000));
                    if(!isListening) break;
                }
            }
            
            await new Promise(r => setTimeout(r, gap));
            currentIdx++;
            if(currentIdx >= testList.length) {
                if(confirm("リピートしますか？")) currentIdx = 0; else stopListening();
            }
        }
    }

    function stopListening() { isListening = false; window.speechSynthesis.cancel(); document.getElementById('listen-setup').style.display = 'block'; document.getElementById('listen-display').style.display = 'none'; }

    async function saveNewWord() {
        const url = localStorage.getItem('conf_gas_url'); if(!url) return alert("URL未設定");
        const data = {
            no: Date.now(), korean: document.getElementById('in-ko').value.trim(),
            heyotai: document.getElementById('in-heyotai').value.trim(),
            meaning: document.getElementById('in-ja').value.trim(),
            pron: document.getElementById('in-pron').value.trim(),
            category: document.getElementById('in-cat').value.trim(),
            ex_ko: document.getElementById('in-ex-ko').value.trim(),
            ex_ja: document.getElementById('in-ex-ja').value.trim()
        };
        if(!data.korean || !data.meaning) return alert("入力不足");
        showToast("送信中...");
        try {
            await fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            showToast("送信成功");
            ['in-ko','in-heyotai','in-ja','in-pron','in-cat','in-ex-ko','in-ex-ja'].forEach(id => document.getElementById(id).value = '');
        } catch (e) { alert("エラー"); }
    }
</script>
